<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antakshari Languages</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #1f2933;
      background: #f6f8fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 700;
    }

    p {
      margin: 0 0 24px;
      color: #52616f;
      line-height: 1.5;
    }

    .language-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .language-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      text-decoration: none;
    }

    .language-link:hover,
    .language-link:focus-visible {
      border-color: #627d98;
      outline: none;
    }

    .language-name {
      font-weight: 700;
    }

    .language-code {
      color: #627d98;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Choose Language</h1>
    <p>Select a subtitle language to open the speech review player.</p>

    <ul class="language-list">
      <li>
        <a class="language-link" href="speechClaude.html?language_code=en-US&amp;srt_language=en&amp;audio_base=speech/en-US">
          <span class="language-name">English</span>
          <span class="language-code">en-US</span>
        </a>
      </li>
      <li>
        <a class="language-link" href="speechClaude.html?language_code=hi-IN&amp;srt_language=hi&amp;audio_base=speech/hi-IN">
          <span class="language-name">Hindi</span>
          <span class="language-code">hi-IN</span>
        </a>
      </li>
      <li>
        <a class="language-link" href="speechClaude.html?language_code=ru-RU&amp;srt_file=captionFile_ru-RU.srt&amp;audio_base=speech/ru-RU">
          <span class="language-name">Russian</span>
          <span class="language-code">ru-RU</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
