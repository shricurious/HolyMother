<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8" />
  <title>Video Player with Subtitles</title>
  <link rel="stylesheet" type="text/css" href="diffview.css" />
  <script type="text/javascript" src="diffview.js"></script>
  <script type="text/javascript" src="difflib.js"></script>

  <style>
    /* =====================================================
       ORIGINAL speech.css — preserved exactly
       ===================================================== */
    @media (orientation: landscape) {}
    @media (orientation: portrait) {}

    body {
      margin: 0;
    }

    .container {
      display: flex;
      border: none;
      flex-direction: column;
      justify-content: center;
      justify-items: center;
      align-items: center;
      margin: 0;
      position: relative;
    }

    .video-container {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      justify-items: center;
      border: none;
      height: 100vh;
      margin: 0;
    }

    #video {
      max-inline-size: 100%;
      block-size: auto;
      object-fit: cover;
      object-position: top center;
      align-self: center;
      height: 81vh;
      border: none;
    }

    .subtitles {
      background-color: rgba(0, 0, 0, 0.40);
      color: #fff;
      font-size: 1.5rem;
      height: 10vh;
      width: 80%;
      max-inline-size: 100%;
      position: absolute;
      top: 60%;
      left: 20%;
      transform: translate(-15%, -25%);
      text-align: center;
    }

    #speed-slider {
      position: relative;
      bottom: 150;
      left: 0;
      max-inline-size: 100%;
    }

    .subtitlebox {
      margin: 0;
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      align-items: center;
      align-self: center;
      width: 100%;
    }

    .textbox {
      width: 100%;
      scroll-behavior: smooth;
      font-size: 1rem;
    }

    .buttonbar {
      justify-items: center;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    /* =====================================================
       RESPONSIVE OVERRIDES
       ===================================================== */

    /* --- Video wrapper: the key fix.
           Wrapping <video> + .subtitles in a relative box
           means the subtitle is always positioned against
           the video itself, not the outer container.      */
    .video-wrapper {
      position: relative;
      width: 100%;
      align-self: center;
      /* Matches the original video height so the wrapper
         is exactly as tall as the video element          */
      height: 81vh;
      display: flex;
    }

    /* Re-anchor #video to fill the wrapper */
    #video {
      width: 100%;
      height: 100%;
    }

    /* Re-anchor .subtitles to the bottom of the wrapper,
       just above the browser's native video controls
       (~44px on desktop, ~52px on iOS, ~48px on Android).
       Using 52px covers all common cases.                */
    .subtitles {
      position: absolute;
      bottom: 52px;          /* sit above native controls  */
      left: 50%;
      transform: translateX(-50%);
      top: auto;             /* override original top:60%  */
      width: 90%;
      max-width: 100%;
      height: auto;
      min-height: 2em;
      font-size: clamp(0.9rem, 2.5vw, 1.5rem);
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* --- Video container: allow scroll on small screens  */
    @media (max-width: 768px) {
      .video-container {
        height: auto;
        min-height: 100svh;  /* svh avoids mobile browser
                                chrome pushing content    */
        padding-bottom: 8px;
      }
    }

    /* --- Portrait phones: shorter video so the rest fits */
    @media (max-width: 600px) and (orientation: portrait) {
      .video-wrapper {
        height: 40vh;
      }
    }

    /* --- Landscape phones: video height bounded by screen */
    @media (max-height: 500px) and (orientation: landscape) {
      .video-wrapper {
        height: 54vh;
      }
      /* Less bottom offset needed — controls are slimmer
         in landscape on most mobile browsers             */
      .subtitles {
        bottom: 44px;
        font-size: clamp(0.75rem, 2vw, 1rem);
      }
    }

    /* --- Subtitle textboxes: stack on phones ----------- */
    @media (max-width: 600px) {
      .subtitlebox {
        flex-direction: column;
      }
    }

    /* --- Button bar: wrap on phones -------------------- */
    @media (max-width: 768px) {
      .buttonbar {
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 8px;
      }
      .buttonbar button {
        flex: 1 1 calc(50% - 6px);
        min-width: 120px;
        font-size: 0.82rem;
        padding: 8px 6px;
      }
    }

    @media (max-width: 380px) {
      .buttonbar button {
        flex: 1 1 100%;
      }
    }

    /* --- Diff output overflow -------------------------- */
    #diffoutput {
      width: 100%;
      overflow-x: auto;
    }

    #diffoutput table {
      min-width: 0;
      word-break: break-word;
    }

    /* --- Context row ----------------------------------- */
    #context {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="pageBody" class="container">
    <div id="video-container" class="video-container">

      <!-- video-wrapper keeps subtitles anchored to the
           video box in every orientation                  -->
      <div class="video-wrapper">
        <video id="video" controls>
          <source src="QuestionAndAnswers.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <div id="subtitles" class="subtitles"></div>
      </div>

      <div id="subtitleBox" class="subtitlebox">
        <textarea id="OLsubtitlesTA"      rows="7" readonly class="textbox"></textarea>
        <textarea id="subtitles-textarea" rows="7"          class="textbox"></textarea>
      </div>

      <div id="buttonbar" class="buttonbar">
        <button id="pauseTlAudio"    type="button">Pause Translated Audio</button>
        <button id="playTlAudio"     type="button">Play Translated Audio</button>
        <button id="hideOLSubtitles" type="button">Hide Original Lang Subtitles</button>
        <button id="showOLSubtitles" type="button">Show Original Lang Subtitles</button>
        <button id="showDiff"        value="show" type="button">Show My Changes</button>
        <button id="reset"           type="button">Reset My Changes</button>
        <button id="submit"          type="submit">Submit My Changes</button>
      </div>

    </div>

    <div id="diffoutput"></div>

    <div class="top" id="context">
      <strong>Context size (optional):</strong>
      <input type="text" id="contextSize" value="" />
    </div>

    <audio id="tlaudio" hidden>
      <source src="" type="audio/mp3">
    </audio>
  </div>

  <script src="speech.js"></script>
</body>
</html>
